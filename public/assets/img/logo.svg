<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 40" fill="none">
  <!-- Circuit board traces -->
  <line x1="10" y1="20" x2="22" y2="20" stroke="#00d4ff" stroke-width="1.5"/>
  <line x1="22" y1="20" x2="22" y2="10" stroke="#00d4ff" stroke-width="1.5"/>
  <line x1="22" y1="10" x2="32" y2="10" stroke="#00d4ff" stroke-width="1.5"/>
  <circle cx="10" cy="20" r="2" fill="#00d4ff"/>
  <circle cx="32" cy="10" r="2" fill="#7b2d8b"/>

  <!-- IC chip -->
  <rect x="32" y="4" width="18" height="16" rx="2" fill="#0f172a" stroke="#00d4ff" stroke-width="1.2"/>
  <!-- Chip pins top -->
  <line x1="37" y1="4"  x2="37" y2="1"  stroke="#00d4ff" stroke-width="1"/>
  <line x1="42" y1="4"  x2="42" y2="1"  stroke="#00d4ff" stroke-width="1"/>
  <line x1="47" y1="4"  x2="47" y2="1"  stroke="#00d4ff" stroke-width="1"/>
  <!-- Chip pins bottom -->
  <line x1="37" y1="20" x2="37" y2="23" stroke="#00d4ff" stroke-width="1"/>
  <line x1="42" y1="20" x2="42" y2="23" stroke="#00d4ff" stroke-width="1"/>
  <line x1="47" y1="20" x2="47" y2="23" stroke="#00d4ff" stroke-width="1"/>
  <!-- Chip dot -->
  <circle cx="34.5" cy="6.5" r="1" fill="#00d4ff"/>

  <!-- Trace out of chip -->
  <line x1="50" y1="12" x2="58" y2="12" stroke="#00d4ff" stroke-width="1.5"/>
  <line x1="37" y1="23" x2="37" y2="30" stroke="#00d4ff" stroke-width="1.5"/>
  <line x1="37" y1="30" x2="50" y2="30" stroke="#00d4ff" stroke-width="1.5"/>
  <circle cx="50" cy="30" r="2" fill="#ff6b35"/>

  <!-- Wordmark -->
  <text x="60" y="14" font-family="'Segoe UI',system-ui,sans-serif" font-size="11" font-weight="700" fill="#00d4ff">CoDevNexus</text>
  <text x="60" y="28" font-family="'Segoe UI',system-ui,sans-serif" font-size="7" fill="#7b2d8b" letter-spacing="2">PORTFOLIO</text>
</svg>
